<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuralDisc - Seu Perfil do Discord</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <!-- Seção de Login -->
    <div id="login-section" class="login-card">
        <h1>Bem-vindo ao MuralDisc</h1>
        <p>Faça login com seu Discord para criar seu mural ou acesse o link de um perfil existente.</p>
        <button onclick="loginDiscord()" class="discord-btn">
            <svg viewBox="0 0 127.14 96.36" width="24" height="24">
                <path fill="currentColor" d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.31,60,73.31,53s5-12.74,11.43-12.74S96.1,46,96,53,91.08,65.69,84.69,65.69Z"/>
            </svg>
            Entrar com Discord
        </button>
    </div>

    <!-- Seção do Perfil -->
    <div id="profile-section" style="display: none;">
        <div class="profile-card">
            <div class="banner"></div>
            <div class="avatar">
                <img
                    id="avatar"
                    src="https://cdn.discordapp.com/embed/avatars/0.png"
                    alt="Avatar"
                >
            </div>
            <h1 id="username">Carregando...</h1>
            <p class="bio" id="bio">
                Carregando perfil...
            </p>
        </div>

        <div class="comments-card">
            <h2>Comentários</h2>
            <div id="comments"></div>
            <div class="comment-form">
                <input
                    type="text"
                    id="author"
                    placeholder="Seu nome">
                <textarea
                    id="commentText"
                    placeholder="Escreva um comentário...">
                </textarea>
                <button onclick="sendComment()">
                    Enviar Comentário
                </button>
            </div>
        </div>
    </div>

</div>

<script src="./script.js"></script>

</body>
</html>
